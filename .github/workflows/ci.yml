name: CI Pipeline

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3

    - name: Install
      run: npm install

    - name: Build
      run: npm run build || echo "No build step"

    - name: Test
      run: npm test || echo "No tests"